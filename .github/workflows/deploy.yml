name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Smoke check build output
        run: |
          test -f dist/index.html || (echo "missing dist/index.html"; exit 1)
          test -f dist/lab/index.html || (echo "missing dist/lab/index.html"; exit 1)
          test -f dist/.nojekyll || (echo "missing .nojekyll"; exit 1)
          test -f dist/CNAME || (echo "missing CNAME"; exit 1)
          test -f dist/fonts/fonts.css || (echo "missing fonts/fonts.css"; exit 1)
          test -f dist/favicons/favicon-32.png || (echo "missing favicons"; exit 1)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
